<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoopFly | Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

  <header class="header">
    <img src="LoopFly.png" alt="" id="loopfly">
        <ul id="ulogo">
            <li><a href="index.html" class="pages">Home</a></li>
            <li><a href="QuemSomos.html" class="pages">Quem Somos</a></li>
            <li><a href="servicos.html" class="pages">Serviços</a></li>
            <li><a href="" class="pages">Contato</a></li>
        </ul>
        <div class="cont-icons">
            <a href="pesquisa.html"><img src="lupa.png" alt="" class="icons"></a>
            <a href="carrinho.html"><img src="carrinho.png" alt="" class="icons"></a>
            <a href="login.html"><img src="user.png" alt="" class="icons user"></a>
        </div>
  </header>

  <main class="main">


    <section class="login">
      <span class="eyebrow">CRIE SUA CONTA</span>

      <div class="login-card">
        <h1 class="login-card__title">Crie sua conta</h1>
        <p class="login-card__desc">Preencha os dados abaixo para começar a usar a Loopfly.</p>

        <form class="form">
          <div class="form__row">
            <div class="input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" placeholder="Seu Nome">
            </div>
            <div class="input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
              <input type="email" placeholder="Seu e-mail">
            </div>
          </div>

          <div class="input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.34 1.79.65 2.65a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.43-1.43a2 2 0 0 1 2.11-.45c.86.31 1.75.53 2.65.65A2 2 0 0 1 22 16.92z"/></svg>
            <input type="tel" placeholder="Seu Telefone / WhatsApp">
          </div>

          <div class="input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" placeholder="Digite uma senha">
          </div>

          <button type="submit" class="btn-submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Criar conta
          </button>

          <span class="form__secure">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Seus dados estão seguros conosco
          </span>
        </form>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="imglogo">
      <img src="LoopFly.png" alt="" id="logofooter">
    </div>
    <div class="sobrenos">
      <span class="titlefooter">Sobre Nos</span>
      <ul>
        <li>Quem Somos</li>
        <li>Nossos Produtos</li>
      </ul>
    </div>
    <div class="redesSociais">
      <span class="titlefooter">Redes Sociais</span>
      <div class="iconsSociais">
        <img src="Instaicon.png" alt="" class="iconfooter">
        <img src="Face.png" alt="" class="iconfooter">
        <img src="twitter.png" alt="" class="iconfooter">
      </div>
    </div>
    <div class="contato">
      <span class="titlefooter" id="contato">Contato</span>
      <ul>
        <li><img src="user.png" alt="" class="iconfooterContato"> Fale Conosco</li>
        <li><img src="mail.png" alt="" class="iconfooterContato"> contato@loopfly.com</li>
        <li><img src="phone-solid.png" alt="" class="iconfooterContato">  +55 31 94002-8922</li>
      </ul>
    </div>
  </footer>

</body>
</html>
